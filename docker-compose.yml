services:
  postgres:
    image: postgres:18-alpine
    container_name: vibha-dashboard-postgres
    environment:
      POSTGRES_DB: vibha_dashboard
      POSTGRES_USER: vibha
      POSTGRES_PASSWORD: vibha_dev_2024
    ports:
      - "5440:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibha"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
