services:
  # PostgreSQL for Dashboard (NEW - port 5432, isolated)
  postgres:
    image: postgres:18-alpine
    container_name: vibha-dashboard-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vibha_dashboard}
      POSTGRES_USER: ${POSTGRES_USER:-vibha}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vibha_dev_2024}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibha"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vibha-network

volumes:
  postgres_data:

networks:
  vibha-network:
    driver: bridge
